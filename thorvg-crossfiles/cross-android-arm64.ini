# Meson cross-file: Android arm64-v8a, Windows host, NDK r26+.
# API level 24 matches Godot 4.3+ Android minimum.
#
# >>> EDIT THE 4 BINARY PATHS BELOW TO MATCH YOUR NDK INSTALLATION. <<<
# >>> ON LINUX/MACOS HOSTS:                                          <<<
# >>>   - use windows-x86_64 -> linux-x86_64 / darwin-x86_64         <<<
# >>>   - drop the .cmd suffix on the clang/clang++ wrappers         <<<
# >>>   - drop the .exe suffix on llvm-ar / llvm-strip               <<<

[binaries]
c = 'C:/Android/sdk/ndk/26.3.11579264/toolchains/llvm/prebuilt/windows-x86_64/bin/aarch64-linux-android24-clang.cmd'
cpp = 'C:/Android/sdk/ndk/26.3.11579264/toolchains/llvm/prebuilt/windows-x86_64/bin/aarch64-linux-android24-clang++.cmd'
ar = 'C:/Android/sdk/ndk/26.3.11579264/toolchains/llvm/prebuilt/windows-x86_64/bin/llvm-ar.exe'
strip = 'C:/Android/sdk/ndk/26.3.11579264/toolchains/llvm/prebuilt/windows-x86_64/bin/llvm-strip.exe'
pkg-config = 'false'

[host_machine]
system = 'android'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
